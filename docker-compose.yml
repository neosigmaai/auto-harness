services:
  autoeval:
    build: .
    env_file: .env
    environment:
      - AGENT_MODEL=${AGENT_MODEL:-gpt-5.4}
      - TAU2_DATA_DIR=/tau2_data
      # baseline_mini_swe.py: path to mounted mini-swe-agent repo
      - MINI_SWE_AGENT_ROOT=/mini-swe-agent
    volumes:
      # Mount all editable files so changes take effect without rebuilding
      - ./agent:/app/agent
      - ./workspace:/app/workspace
      - ./experiment_config.yaml:/app/experiment_config.yaml
      - ./benchmark.py:/app/benchmark.py
      - ./gating.py:/app/gating.py
      - ./prepare.py:/app/prepare.py
      - ./record.py:/app/record.py
      - ./testing:/app/testing
      # Local mini-swe-agent clone (sibling of auto-harness) for testing/baseline_mini_swe.py
      - ${MINI_SWE_AGENT_DIR:-../mini-swe-agent}:/mini-swe-agent
      # SWE-Bench harness writes logs/run_evaluation/<run_id>/... (cwd /app); persist on host
      - ./logs:/app/logs
      # Mount tau2 data directory (set TAU2_DATA_DIR in .env; any path works for SWE-only dev)
      - ${TAU2_DATA_DIR}:/tau2_data
      # SWE-Bench official harness (swe_skip_harness: false): use host Docker from inside the app container
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true
